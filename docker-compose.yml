services:
  db:
    image: postgres:15-alpine
    container_name: rmm_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - rmm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rmm_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AGENT_API_KEY: ${AGENT_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - rmm_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
        JWT_SECRET: ${JWT_SECRET}
    container_name: rmm_frontend
    restart: always
    depends_on:
      - backend
    environment:
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_URL: "http://backend:8080"
    ports:
      - "3000:3000"

volumes:
  rmm_pgdata:
  rmm_uploads:
